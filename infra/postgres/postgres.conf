# Postgres 16 tuning for the 4 GB / 2 vCPU prod VPS.
# Defaults are conservative for a small server — these get us out of
# swap and let larger working sets fit in shared buffers + page cache.
#
# Pgtune-style baseline for a small OLTP server. Adjust when we scale up
# the host: roughly shared_buffers ≈ 25% of RAM, effective_cache_size ≈
# 50% of RAM.

# ── Networking ──────────────────────────────────────────────────────────────
# When postgres is told `-c config_file=...`, it stops merging with the
# entrypoint's auto-generated postgresql.conf. The compile-time default
# for listen_addresses is `localhost`, which silently blocks the docker
# bridge network — backend containers get `ECONNREFUSED`. Must declare
# this explicitly here.
listen_addresses = '*'

# ── Memory ──────────────────────────────────────────────────────────────────
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB
huge_pages = off

# ── Connections ─────────────────────────────────────────────────────────────
# The app pool is up to (workers × (pool_size + max_overflow)) = 2×30 = 60.
# Leave headroom for psql / pg_isready / alembic.
max_connections = 100

# ── I/O ─────────────────────────────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# ── Query planner ───────────────────────────────────────────────────────────
default_statistics_target = 100

# ── Logging (light) ─────────────────────────────────────────────────────────
log_min_duration_statement = 500ms
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
