server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ip-194-99-21-53-142250.vps.hosted-by-mvps.net;

    ssl_certificate     /etc/letsencrypt/live/ip-194-99-21-53-142250.vps.hosted-by-mvps.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ip-194-99-21-53-142250.vps.hosted-by-mvps.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/payments/webhook {
        limit_req zone=payments burst=5 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    # PDF endpoints — Playwright + LLM can legitimately take 30-60s on a
    # cold cache. Match this to the backend's PDF-cap semaphore (2 concurrent
    # renders) and the LLM client's ~30s budget.
    location ~ ^/api/(destiny-matrix|natal)/(v[0-9]+/)?pdf {
        limit_req zone=api burst=30 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    # Destiny Matrix V3 — first-time /reading fires 15 parallel Sonnet
    # calls (semaphore=6), so cold start is ~60s. Cached reads return
    # instantly. /regenerate similarly waits on Sonnet for one section.
    location ~ ^/api/destiny-matrix/v3/(reading|regenerate) {
        limit_req zone=api burst=30 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /admin {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    location /static/tarot/ {
        alias /opt/astro-tma/static/tarot/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
