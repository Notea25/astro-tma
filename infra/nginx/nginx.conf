worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers — SECURITY_AUDIT.md H3+H4
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # Force HTTPS for 1 year (resists MITM on first visit, e.g. cafe Wi-Fi).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP — backend serves JSON + a couple of inline-styled admin HTML pages.
    # Mini App itself runs on astro-tma.vercel.app (separate Vercel domain),
    # so this CSP only governs admin pages + API responses on the API origin.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org; base-uri 'none'; form-action 'self'" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting.
    # API: Mini App open fans out ~8–12 requests at once. Per-IP rate must
    # also tolerate mobile CGNAT (many users, one egress IP). 20r/s + burst
    # 100 ≈ comfortable for ~10 simultaneous opens behind one NAT.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=payments:10m rate=10r/m;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;  # hide nginx version

    include /etc/nginx/conf.d/*.conf;
}
