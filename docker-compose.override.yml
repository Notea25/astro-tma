# Local development overrides — do NOT place this file on the VPS.
# Production must run: docker compose -f docker-compose.yml up -d
version: '3.9'
services:
  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8018:8000"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
    volumes:
      - ./backend:/app

  # nginx — продовый сервис (TLS, /opt/astro-tma/static, /etc/letsencrypt).
  # Локально не нужен и ломается о несуществующие на хосте пути.
  # profiles прячет его из дефолтного `docker compose up`.
  nginx:
    profiles: ["prod"]

  worker:
    command: ["arq", "worker.WorkerSettings"]
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      LLM_OUTPUT_TPM: "0"   # local: disable throttle to measure raw gen time
    volumes:
      - ./backend:/app

  postgres:
    ports:
      - "5433:5432"   # expose locally for DB GUI tools (5433 to avoid conflicts)

  redis:
    ports:
      - "6380:6379"
