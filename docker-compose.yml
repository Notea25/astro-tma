# Production-ready docker-compose.
# Override with docker-compose.override.yml for local dev.

version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       astro_tma
      POSTGRES_USER:     astro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Override default postgresql.conf with values tuned for the 4 GB VPS.
    # Postgres 16's docker image accepts a `-c config_file=...` argument
    # via the `command:` key; the file is read once at start. The override
    # config is committed at infra/postgres/postgres.conf so dev and prod
    # match.
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astro_tma"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [astro-net]

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [astro-net]

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://astro:${POSTGRES_PASSWORD}@postgres:5432/astro_tma
      REDIS_URL:    redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./backend:/app          # remove in production
    networks: [astro-net]
    labels:
      - "traefik.enable=false"  # managed by nginx

  # ── Worker (arq) ────────────────────────────────────────────────────────────
  # Background natal-PDF generation. Same image as backend (Chromium/Playwright
  # already installed), just a different command. Scale with --scale worker=N;
  # the Redis token bucket keeps all replicas under the Anthropic key's TPM.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://astro:${POSTGRES_PASSWORD}@postgres:5432/astro_tma
      REDIS_URL:    redis://redis:6379/0
    command: ["arq", "worker.WorkerSettings"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./backend:/app          # remove in production
    networks: [astro-net]

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/astro-tma/static:/opt/astro-tma/static:ro
      - nginx_logs:/var/log/nginx
    depends_on: [backend]
    networks: [astro-net]

networks:
  astro-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
