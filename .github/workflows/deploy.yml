name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - name: Check backend deploy secrets
        id: backend_secrets
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Backend deploy blocked::Missing ${name} secret."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t astro-backend:${{ github.sha }} ./backend
          docker tag astro-backend:${{ github.sha }} astro-backend:latest

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key:      ${{ env.VPS_SSH_KEY }}
          script: |
            cd /opt/astro-tma
            git pull origin main
            docker compose pull
            docker compose up -d --build backend
            docker compose exec -T backend alembic upgrade head
            echo "Backend deployed: ${{ github.sha }}"

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check frontend deploy secrets
        id: frontend_secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error title=Frontend deploy blocked::Missing ${name} secret."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ env.VERCEL_TOKEN }}
          vercel-org-id:  ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
